openapi: 3.0.0
info:
  title: Node.js Sign-up and Verification API
  description: Node.js + MySQL - API with email sign-up, verification, authentication and forgot password
  version: 1.0.0
  contact:
    name: Wilson Gayo
    url: https://wilschoy78.github.io/

servers:
  - url: https://node-mysql-api-6gqq.onrender.com
    description: Production server (Render)
  - url: http://localhost:4000
    description: Local development server

tags:
  - name: Authentication
    description: Login and token refresh
  - name: Account Management
    description: Create, update, and delete accounts
  - name: Email Verification
    description: Verify email and password reset

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  
  responses:
    UnauthorizedError:
      description: Access token is missing or invalid
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "Unauthorized"
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "Not Found"

paths:
  /accounts/authenticate:
    post:
      tags:
        - Authentication
      summary: Authenticate account credentials
      description: Returns a JWT token and sets a cookie with refresh token
      operationId: authenticate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  example: "user@example.com"
                password:
                  type: string
                  example: "password123"
      responses:
        "200":
          description: Authentication successful
          headers:
            Set-Cookie:
              description: Refresh token cookie
              schema:
                type: string
                example: refreshToken=xxx; Path=/; HttpOnly
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  title:
                    type: string
                  firstName:
                    type: string
                  lastName:
                    type: string
                  email:
                    type: string
                  role:
                    type: string
                  jwtToken:
                    type: string
        "400":
          description: Invalid email or password
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Email or password is incorrect"

  /accounts/refresh-token:
    post:
      tags:
        - Authentication
      summary: Refresh JWT token
      description: Uses refresh token from cookie to generate new tokens
      operationId: refreshToken
      responses:
        "200":
          description: New tokens generated
          headers:
            Set-Cookie:
              description: New refresh token cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  jwtToken:
                    type: string
        "401":
          description: Invalid or expired refresh token

  /accounts/revoke-token:
    post:
      tags:
        - Authentication
      summary: Revoke refresh token
      description: Revokes the current refresh token (logout)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Token revoked successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Token revoked"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /accounts/register:
    post:
      tags:
        - Account Management
      summary: Register a new account
      description: First registered account becomes Admin
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - firstName
                - lastName
                - email
                - password
                - confirmPassword
                - acceptTerms
              properties:
                title:
                  type: string
                  enum: [Mr, Mrs, Miss, Ms]
                  example: "Mr"
                firstName:
                  type: string
                  example: "John"
                lastName:
                  type: string
                  example: "Doe"
                email:
                  type: string
                  example: "john@example.com"
                password:
                  type: string
                  example: "password123"
                confirmPassword:
                  type: string
                  example: "password123"
                acceptTerms:
                  type: boolean
                  example: true
      responses:
        "200":
          description: Registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Registration successful, please check your email for verification instructions"

  /accounts/verify-email:
    post:
      tags:
        - Email Verification
      summary: Verify email address
      description: Uses token sent via email to verify account
      operationId: verifyEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
                  example: "abc123def456"
      responses:
        "200":
          description: Email verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Verification successful, you can now login"
        "400":
          description: Invalid token

  /accounts/forgot-password:
    post:
      tags:
        - Email Verification
      summary: Request password reset
      description: Sends password reset email with token
      operationId: forgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  example: "john@example.com"
      responses:
        "200":
          description: Reset email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Please check your email for password reset instructions"

  /accounts/validate-reset-token:
    post:
      tags:
        - Email Verification
      summary: Validate reset token
      description: Checks if password reset token is valid
      operationId: validateResetToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
                  example: "abc123def456"
      responses:
        "200":
          description: Token is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Token is valid"
        "400":
          description: Invalid token

  /accounts/reset-password:
    post:
      tags:
        - Email Verification
      summary: Reset password
      description: Resets password using valid token
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - password
                - confirmPassword
              properties:
                token:
                  type: string
                  example: "abc123def456"
                password:
                  type: string
                  example: "newpassword123"
                confirmPassword:
                  type: string
                  example: "newpassword123"
      responses:
        "200":
          description: Password reset successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Password reset successful, you can now login"
        "400":
          description: Invalid token

  /accounts:
    get:
      tags:
        - Account Management
      summary: Get all accounts
      description: Admin only
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of all accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    title:
                      type: string
                    firstName:
                      type: string
                    lastName:
                      type: string
                    email:
                      type: string
                    role:
                      type: string
        "401":
          $ref: "#/components/responses/UnauthorizedError"

    post:
      tags:
        - Account Management
      summary: Create account
      description: Admin only
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - firstName
                - lastName
                - email
                - password
                - confirmPassword
                - role
              properties:
                title:
                  type: string
                  enum: [Mr, Mrs, Miss, Ms]
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                password:
                  type: string
                confirmPassword:
                  type: string
                role:
                  type: string
                  enum: [Admin, User]
      responses:
        "200":
          description: Account created
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /accounts/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Account ID

    get:
      tags:
        - Account Management
      summary: Get account by ID
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Account details
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  title:
                    type: string
                  firstName:
                    type: string
                  lastName:
                    type: string
                  email:
                    type: string
                  role:
                    type: string
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"

    put:
      tags:
        - Account Management
      summary: Update account
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                password:
                  type: string
                confirmPassword:
                  type: string
                role:
                  type: string
                  enum: [Admin, User]
      responses:
        "200":
          description: Account updated
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"

    delete:
      tags:
        - Account Management
      summary: Delete account
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Account deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Account deleted successfully"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
